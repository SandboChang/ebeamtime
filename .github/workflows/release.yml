name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  UV_VERSION: 0.11.29
  GDSDIFF_CANDIDATE: 0.1.0rc1

jobs:
  build:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
      - name: Verify tag and package versions
        shell: bash
        run: |
          package_version=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          test "v$package_version" = "$GITHUB_REF_NAME"
      - run: uv venv .venv
      - run: uv pip install --python .venv --index-url https://pypi.org/simple gdstk numpy jsonschema pytest
      - run: uv pip install --python .venv --index-url https://test.pypi.org/simple --no-deps "gdsdiff==${{ env.GDSDIFF_CANDIDATE }}"
      - run: uv pip install --python .venv --no-deps -e .
      - run: uv run --no-sync python -m pytest
      - run: uv build --no-sources
      - run: uvx --from twine==6.2.0 twine check --strict dist/*
      - name: Stage immutable release artifacts and hashes
        shell: bash
        run: |
          mkdir -p release/packages
          cp dist/* release/packages/
          cd release/packages
          sha256sum * > ../SHA256SUMS
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: release-distributions
          path: release/
          if-no-files-found: error
          retention-days: 30

  testpypi:
    needs: build
    timeout-minutes: 10
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: release-distributions
          path: release
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: release/packages
          repository-url: https://test.pypi.org/legacy/

  verify-testpypi:
    needs: testpypi
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
      - name: Install exact TestPyPI release without dependency confusion
        shell: bash
        run: |
          version=${GITHUB_REF_NAME#v}
          uv venv /tmp/ebeamtime-testpypi
          uv pip install --python /tmp/ebeamtime-testpypi/bin/python --index-url https://pypi.org/simple gdstk numpy jsonschema
          uv pip install --python /tmp/ebeamtime-testpypi/bin/python --index-url https://test.pypi.org/simple --no-deps "gdsdiff==$GDSDIFF_CANDIDATE"
          uv pip install --python /tmp/ebeamtime-testpypi/bin/python --index-url https://test.pypi.org/simple --no-deps "ebeamtime==$version"
          cd /tmp
          /tmp/ebeamtime-testpypi/bin/python "$GITHUB_WORKSPACE/scripts/installed_smoke.py"

  pypi:
    if: ${{ !contains(github.ref_name, 'rc') }}
    needs: verify-testpypi
    timeout-minutes: 10
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: release-distributions
          path: release
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: release/packages

  github-release:
    if: ${{ !contains(github.ref_name, 'rc') }}
    needs: pypi
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: release-distributions
          path: release
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release/packages/* release/SHA256SUMS --verify-tag --generate-notes
